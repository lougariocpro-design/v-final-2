<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Futuristic Radar</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>

</head>

<body>

<div class="interface">

<h1>ARDUINO RADAR SYSTEM</h1>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
